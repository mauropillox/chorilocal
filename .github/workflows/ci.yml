name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== BACKEND TESTS ====================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=html --junitxml=test-results.xml
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          DB_PATH: /tmp/test_ventas.db

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

  # ==================== FRONTEND TESTS ====================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000/api' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ==================== BACKEND LINT ====================
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory until existing issues are fixed
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.9.7

      - name: Run ruff linter
        run: ruff check . --output-format=github || true

  # ==================== FRONTEND LINT ====================
  lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory until ESLint deps are added to package.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint || true

  # ==================== E2E TESTS (Optional) ====================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: contains(github.event.pull_request.labels.*.name, 'run-e2e')
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test
          DB_PATH: /tmp/friosur-e2e.db

      - name: Start frontend server
        working-directory: frontend
        run: |
          npx serve -s dist -l 5173 &
          sleep 3

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_URL: http://localhost:5173

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  # ==================== CI SUCCESS CHECK ====================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-lint, frontend-tests, frontend-build, lint]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "=== CI Results ==="
          echo "Backend tests:  ${{ needs.backend-tests.result }}"
          echo "Backend lint:   ${{ needs.backend-lint.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "Frontend build: ${{ needs.frontend-build.result }}"
          echo "Frontend lint:  ${{ needs.lint.result }}"
          echo "================="

          # Required checks (must pass)
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi

          # Advisory checks (warn but don't block)
          if [ "${{ needs.backend-lint.result }}" != "success" ]; then
            echo "⚠️  Backend lint has issues (non-blocking)"
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "⚠️  Frontend lint has issues (non-blocking)"
          fi

          echo "✅ All required CI checks passed!"
